---
title: "📄 Diff Tool"
tags: ["Tools"]
---

<style>
    #diff-container {
        width: 100%;
        height: 80vh;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    #toolbar {
        display: flex;
        gap: 8px;
        padding: 8px 4px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        align-items: center;
    }

    #toolbar button {
        padding: 5px 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f5f5f5;
        cursor: pointer;
        font-size: 13px;
        font-family: inherit;
        transition: background 0.15s;
    }

    #toolbar button:hover {
        background: #e0e0e0;
    }

    #toolbar button.active {
        background: #4363d8;
        color: #fff;
        border-color: #4363d8;
    }

    #toolbar label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
    }

    .eol-lf::after {
        content: '↵';
        color: #b0b0b0;
    }

    .eol-crlf::after {
        content: '␍↵';
        color: #b0b0b0;
    }

    .eol-cr::after {
        content: '␍';
        color: #b0b0b0;
    }
</style>

<div id="toolbar">
    <button id="btn-inline" title="Toggle inline diff view">📏 Inline</button>
    <button id="btn-clear" title="Clear both editors">🗑️ Clear</button>
    <label title="Toggle whitespace visibility in diff">
        <input type="checkbox" id="chk-whitespace" />
        Whitespace
    </label>
    <label title="Show invisible characters (spaces, tabs, etc.)">
        <input type="checkbox" id="chk-invisible" />
        Invisible Chars
    </label>
    <label title="Toggle word wrap">
        <input type="checkbox" id="chk-wordwrap" checked />
        Word Wrap
    </label>
</div>
<div id="diff-container"></div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });

    require(['vs/editor/editor.main'], function () {
        const originalModel = monaco.editor.createModel(
            'Paste original text here.',
            'plaintext'
        );
        const modifiedModel = monaco.editor.createModel(
            'Paste modified text here.',
            'plaintext'
        );

        const diffEditor = monaco.editor.createDiffEditor(
            document.getElementById('diff-container'),
            {
                automaticLayout: true,
                renderSideBySide: true,
                originalEditable: true,
                fontSize: 14,
                wordWrap: 'on',
                diffWordWrap: 'on',
                minimap: { enabled: false },
            }
        );

        diffEditor.setModel({
            original: originalModel,
            modified: modifiedModel,
        });

        // Inline toggle
        const btnInline = document.getElementById('btn-inline');
        let inline = false;
        btnInline.addEventListener('click', function () {
            inline = !inline;
            diffEditor.updateOptions({ renderSideBySide: !inline });
            btnInline.classList.toggle('active', inline);
        });

        // Clear both
        document.getElementById('btn-clear').addEventListener('click', function () {
            originalModel.setValue('');
            modifiedModel.setValue('');
        });

        // Whitespace toggle
        document.getElementById('chk-whitespace').addEventListener('change', function () {
            diffEditor.updateOptions({
                ignoreTrimWhitespace: !this.checked,
            });
        });

        // Word wrap toggle
        document.getElementById('chk-wordwrap').addEventListener('change', function () {
            const value = this.checked ? 'on' : 'off';
            diffEditor.updateOptions({
                wordWrap: value,
                diffWordWrap: value,
            });
        });

        // Line ending decorations for both editors
        let origEolDecorations = [];
        let modEolDecorations = [];

        function getEolClassName(model) {
            const eol = model.getEOL();
            if (eol === '\r\n') return 'eol-crlf';
            if (eol === '\r') return 'eol-cr';
            return 'eol-lf';
        }

        function buildEolDecorations(model) {
            const cls = getEolClassName(model);
            const lineCount = model.getLineCount();
            const decorations = [];
            for (let i = 1; i <= lineCount; i++) {
                const lineLen = model.getLineLength(i);
                decorations.push({
                    range: new monaco.Range(i, lineLen + 1, i, lineLen + 1),
                    options: {
                        afterContentClassName: cls,
                    },
                });
            }
            return decorations;
        }

        function applyEolDecorations() {
            const origEditor = diffEditor.getOriginalEditor();
            const modEditor = diffEditor.getModifiedEditor();
            origEolDecorations = origEditor.deltaDecorations(
                origEolDecorations,
                buildEolDecorations(originalModel)
            );
            modEolDecorations = modEditor.deltaDecorations(
                modEolDecorations,
                buildEolDecorations(modifiedModel)
            );
        }

        function clearEolDecorations() {
            const origEditor = diffEditor.getOriginalEditor();
            const modEditor = diffEditor.getModifiedEditor();
            origEolDecorations = origEditor.deltaDecorations(origEolDecorations, []);
            modEolDecorations = modEditor.deltaDecorations(modEolDecorations, []);
        }

        // Invisible characters toggle
        let invisibleOn = false;
        const chkInvisible = document.getElementById('chk-invisible');

        // Re-apply EOL decorations when content changes
        originalModel.onDidChangeContent(function () {
            if (invisibleOn) applyEolDecorations();
        });
        modifiedModel.onDidChangeContent(function () {
            if (invisibleOn) applyEolDecorations();
        });

        chkInvisible.addEventListener('change', function () {
            invisibleOn = this.checked;
            const value = this.checked ? 'all' : 'none';
            diffEditor.updateOptions({
                renderWhitespace: value,
                renderControlCharacters: this.checked,
            });
            if (this.checked) {
                applyEolDecorations();
            } else {
                clearEolDecorations();
            }
        });
    });
</script>
