---
title: "Multi-Search Highlighter"
tags: ["Tools"]
---

<style>
    #editor-container {
        width: 100%;
        height: 80vh;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    #status-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 4px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        color: #555;
    }

    .highlight-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
    }

    .highlight-chip:hover {
        opacity: 0.8;
    }

    .highlight-chip .count {
        font-weight: 400;
        opacity: 0.85;
    }
</style>

<div id="status-bar"></div>
<div id="editor-container"></div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });

    require(['vs/editor/editor.main'], function () {
        const editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: 'Paste or type your text here.\nThen Ctrl+Click on any word to highlight all its occurrences.\nCtrl+Click the same word again to remove the highlight.\nYou can also select text first, then Ctrl+Click to highlight that selection.',
            language: 'plaintext',
            theme: 'vs',
            minimap: { enabled: true },
            wordWrap: 'on',
            fontSize: 14,
            automaticLayout: true,
        });

        // Color palette for highlights
        const COLORS = [
            '#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4',
            '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990',
            '#dcbeff', '#9A6324', '#800000', '#aaffc3', '#808000',
            '#000075', '#a9a9a9',
        ];
        // Convert hex to rgba for background highlights
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Inject a CSS class for a highlight color and return the class name
        const styleSheet = document.createElement('style');
        document.head.appendChild(styleSheet);
        function createHighlightClass(color, index) {
            const className = `msh-highlight-${index}`;
            styleSheet.sheet.insertRule(
                `.${className} { background-color: ${hexToRgba(color, 0.35)} !important; }`,
                styleSheet.sheet.cssRules.length
            );
            return className;
        }

        let colorIndex = 0;
        // Map: searchTerm -> { color, className, decorationIds }
        const highlights = new Map();

        function getNextColor() {
            const color = COLORS[colorIndex % COLORS.length];
            colorIndex++;
            return color;
        }

        function findAllOccurrences(model, searchText) {
            const matches = model.findMatches(searchText, false, false, true, null, false);
            return matches.map(m => m.range);
        }

        function updateStatusBar() {
            const bar = document.getElementById('status-bar');
            if (highlights.size === 0) {
                bar.innerHTML = '<span>Ctrl+Click a word to highlight. Select text first for multi-word highlights.</span>';
                return;
            }
            bar.innerHTML = '';
            for (const [term, info] of highlights) {
                const chip = document.createElement('span');
                chip.className = 'highlight-chip';
                chip.style.backgroundColor = info.color;
                chip.innerHTML = `${term} <span class="count">(${info.decorationIds.length})</span>`;
                chip.title = `Click to remove highlight for "${term}"`;
                chip.addEventListener('click', () => {
                    removeHighlight(term);
                });
                bar.appendChild(chip);
            }
        }

        function addHighlight(term) {
            const model = editor.getModel();
            const ranges = findAllOccurrences(model, term);
            if (ranges.length === 0) return;

            const color = getNextColor();
            const className = createHighlightClass(color, colorIndex);
            const decorations = ranges.map(range => ({
                range,
                options: {
                    isWholeLine: false,
                    inlineClassName: className,
                    overviewRuler: {
                        color: color,
                        position: monaco.editor.OverviewRulerLane.Full,
                    },
                },
            }));

            const ids = editor.deltaDecorations([], decorations);
            highlights.set(term, { color, className, decorationIds: ids });
            updateStatusBar();
        }

        function removeHighlight(term) {
            const info = highlights.get(term);
            if (!info) return;
            editor.deltaDecorations(info.decorationIds, []);
            highlights.delete(term);
            updateStatusBar();
        }

        // Handle Ctrl+Click
        editor.onMouseDown(function (e) {
            if (!(e.event.ctrlKey && e.event.leftButton)) return;
            e.event.preventDefault();
            e.event.stopPropagation();

            const model = editor.getModel();
            const selection = editor.getSelection();
            let term = '';

            // If there's a non-empty selection, use it
            if (selection && !selection.isEmpty()) {
                term = model.getValueInRange(selection);
            } else if (e.target.position) {
                // Get the word at the click position
                const wordAtPos = model.getWordAtPosition(e.target.position);
                if (wordAtPos) {
                    term = wordAtPos.word;
                }
            }

            if (!term) return;

            // Toggle: if already highlighted, remove; otherwise add
            if (highlights.has(term)) {
                removeHighlight(term);
            } else {
                addHighlight(term);
            }
        });

        // Re-apply highlights when content changes
        editor.onDidChangeModelContent(function () {
            const model = editor.getModel();
            for (const [term, info] of highlights) {
                // Remove old decorations
                editor.deltaDecorations(info.decorationIds, []);
                // Find new occurrences
                const ranges = findAllOccurrences(model, term);
                if (ranges.length === 0) {
                    highlights.delete(term);
                    continue;
                }
                const decorations = ranges.map(range => ({
                    range,
                    options: {
                        isWholeLine: false,
                        inlineClassName: info.className,
                        overviewRuler: {
                            color: info.color,
                            position: monaco.editor.OverviewRulerLane.Full,
                        },
                    },
                }));
                info.decorationIds = editor.deltaDecorations([], decorations);
            }
            updateStatusBar();
        });

        updateStatusBar();
    });
</script>
