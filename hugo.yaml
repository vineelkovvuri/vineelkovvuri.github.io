  footer: "&copy; Vineel Kumar Reddy Kovvuri 2017 -- {Year} ❤️ [Hugo Xmin](https://xmin.yihui.org/)"

# We are using hugo supported default syntax highlighter.
markup:
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 1
  highlight:
    codeFences: true
    lineNos: false   # enabling this will cause code not wrap
    guessSyntax : true
    pygmentsUseClasses : true
    pygmentsCodefences : true
    style : pastie
  goldmark:
    renderer:
      unsafe: true
    extensions:
          extras:
            delete:
              enable: true
            insert:
              enable: true
            mark:
              enable: true
            subscript:
              enable: true
            superscript:
              enable: true
          strikethrough: false
enableEmoji: true